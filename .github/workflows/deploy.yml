name: Deploy to GitHub Pages
on:
  push:
    branches: [main, develop]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy config
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "base=/alchemydoku/" >> "$GITHUB_OUTPUT"
            echo "dest=" >> "$GITHUB_OUTPUT"
          else
            echo "base=/alchemydoku/preview/" >> "$GITHUB_OUTPUT"
            echo "dest=preview" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_BASE_PATH: ${{ steps.config.outputs.base }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.config.outputs.dest }}
          keep_files: true
